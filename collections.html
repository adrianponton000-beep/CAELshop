<!-- ==========================================
COLLECTIONS LOGIC
========================================== -->

<script>

/* ==========================================
LOAD COLLECTIONS
========================================== */

async function renderCollections(){

    const grid =
    document.getElementById(
        "collections-grid"
    );

    if(!grid) return;

    const collections =
    await getCollections();

    grid.innerHTML = "";

    if(collections.length === 0){

        grid.innerHTML = `

        <div
        class="empty-state">

            <h3>
                No Collections Yet
            </h3>

            <p>
                Create collections
                from the admin panel.
            </p>

        </div>

        `;

        return;

    }

    collections.forEach(collection => {

        grid.innerHTML += `

        <article
        class="collection-card">

            <div
            class="collection-image">

                <img
                src="${collection.banner_url}"
                alt="${collection.name}">

            </div>

            <div
            class="collection-content">

                <span>

                    COLLECTION

                </span>

                <h2>

                    ${collection.name}

                </h2>

                <p>

                    ${
                        collection.description ||
                        ""
                    }

                </p>

            </div>

        </article>

        `;

    });

}


/* ==========================================
FEATURED PRODUCTS
========================================== */

async function renderCollectionProducts(){

    const grid =
    document.getElementById(
        "collection-products-grid"
    );

    if(!grid) return;

    const products =
    await getFeaturedProducts();

    grid.innerHTML = "";

    products.forEach(product => {

        grid.innerHTML += `

        <article
        class="product-card">

            <a
            href="
            product.html?id=${product.id}
            ">

                <img
                src="${product.image_url}"
                alt="${product.name}">

                <div
                class="product-card-content">

                    <h3>

                        ${product.name}

                    </h3>

                    <p>

                        ${product.category}

                    </p>

                    <div
                    class="product-price">

                        $${Number(
                            product.price
                        ).toFixed(2)}

                    </div>

                </div>

            </a>

        </article>

        `;

    });

}


/* ==========================================
INIT
========================================== */

document.addEventListener(
    "DOMContentLoaded",
    async () => {

        await renderCollections();

        await renderCollectionProducts();

    }
);

</script>
