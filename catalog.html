<!-- ==========================================
CATALOG LOGIC
========================================== -->

<script>

let allProducts = [];


/* ===========================
LOAD PRODUCTS
=========================== */

async function loadCatalog(){

    const grid =
    document.getElementById(
        "catalog-grid"
    );

    if(!grid) return;

    allProducts =
    await getProducts();

    renderCatalog(
        allProducts
    );

}


/* ===========================
RENDER
=========================== */

function renderCatalog(products){

    const grid =
    document.getElementById(
        "catalog-grid"
    );

    grid.innerHTML = "";

    if(products.length === 0){

        grid.innerHTML = `

        <p
        style="
        color:#888;
        text-align:center;
        ">

            No products found.

        </p>

        `;

        return;

    }

    products.forEach(product => {

        grid.innerHTML += `

        <article
        class="product-card">

            <a
            href="
            product.html?id=${product.id}
            ">

                <img
                src="${product.image_url}"
                alt="${product.name}">

                <div
                class="product-card-content">

                    <h3>

                        ${product.name}

                    </h3>

                    <p>

                        ${product.category}

                    </p>

                    <div
                    class="product-price">

                        $${Number(
                            product.price
                        ).toFixed(2)}

                    </div>

                </div>

            </a>

        </article>

        `;

    });

}


/* ===========================
SEARCH
=========================== */

function setupSearch(){

    const search =
    document.getElementById(
        "search-input"
    );

    search.addEventListener(
        "input",
        filterProducts
    );

}


/* ===========================
FILTER
=========================== */

function setupCategoryFilter(){

    const filter =
    document.getElementById(
        "category-filter"
    );

    filter.addEventListener(
        "change",
        filterProducts
    );

}


/* ===========================
SORT
=========================== */

function setupSort(){

    const sort =
    document.getElementById(
        "sort-products"
    );

    sort.addEventListener(
        "change",
        filterProducts
    );

}


/* ===========================
FILTER LOGIC
=========================== */

function filterProducts(){

    const searchValue =
    document
    .getElementById(
        "search-input"
    )
    .value
    .toLowerCase();

    const category =
    document
    .getElementById(
        "category-filter"
    )
    .value;

    const sort =
    document
    .getElementById(
        "sort-products"
    )
    .value;

    let filtered =
    [...allProducts];

    if(searchValue){

        filtered =
        filtered.filter(
            product =>

            product.name
            .toLowerCase()
            .includes(
                searchValue
            )
        );

    }

    if(category !== "all"){

        filtered =
        filtered.filter(
            product =>

            product.category ===
            category
        );

    }

    if(sort === "price-low"){

        filtered.sort(
            (a,b)=>

            Number(a.price) -
            Number(b.price)
        );

    }

    if(sort === "price-high"){

        filtered.sort(
            (a,b)=>

            Number(b.price) -
            Number(a.price)
        );

    }

    renderCatalog(
        filtered
    );

}


/* ===========================
INIT
=========================== */

document.addEventListener(
    "DOMContentLoaded",
    async () => {

        await loadCatalog();

        setupSearch();

        setupCategoryFilter();

        setupSort();

    }
);

</script>

</body>
