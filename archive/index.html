<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAEL Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap"
rel="stylesheet">

<style>

:root{

    --bg:#050505;
    --panel:#0D0D0D;
    --panel-2:#141414;
    --border:rgba(255,255,255,.08);
    --text:#F5F5F5;
    --muted:#B8B8B8;

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);

}

button,
input,
textarea,
select{

    font-family:inherit;

}

.hidden{

    display:none!important;

}

/* LOGIN */

.login-screen{

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:40px;

}

.login-card{

    width:100%;
    max-width:480px;

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:32px;

    padding:40px;

}

.login-card img{

    width:140px;

    display:block;

    margin:0 auto 30px;

}

.login-card h1{

    font-size:2rem;

    margin-bottom:24px;

}

.login-card input{

    width:100%;

    background:var(--panel-2);

    border:1px solid var(--border);

    color:white;

    padding:16px;

    border-radius:18px;

    margin-bottom:16px;

}

.login-card button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:999px;

    cursor:pointer;

}

/* APP */

.admin-layout{

    display:grid;

    grid-template-columns:280px 1fr;

    min-height:100vh;

}

.sidebar{

    background:var(--panel);

    border-right:1px solid var(--border);

    padding:30px;

    position:sticky;

    top:0;

    height:100vh;

}

.sidebar-logo{

    width:120px;

    margin-bottom:40px;

}

.sidebar nav{

    display:flex;
    flex-direction:column;
    gap:10px;

}

.sidebar button{

    background:none;
    border:none;

    color:white;

    text-align:left;

    padding:14px 16px;

    border-radius:16px;

    cursor:pointer;

}

.sidebar button:hover{

    background:var(--panel-2);

}

.logout-btn{

    margin-top:40px;

    width:100%;

    background:white!important;
    color:black!important;

}

.main{

    padding:50px;

}

.section{

    display:none;

}

.section.active{

    display:block;

}

.section-title{

    font-size:3rem;

    margin-bottom:40px;

}

.panel{

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:32px;

    padding:30px;

    margin-bottom:30px;

}

.panel h3{

    margin-bottom:20px;

}

.form-grid{

    display:grid;
    gap:16px;

}

.form-grid input,
.form-grid textarea,
.form-grid select{

    background:var(--panel-2);

    border:1px solid var(--border);

    color:white;

    padding:16px;

    border-radius:18px;

}

.form-grid textarea{

    min-height:120px;

    resize:vertical;

}

.primary-btn{

    border:none;

    border-radius:999px;

    padding:16px 24px;

    cursor:pointer;

}

.data-list{

    display:grid;
    gap:16px;

}

.data-item{

    background:var(--panel-2);

    border:1px solid var(--border);

    border-radius:24px;

    padding:20px;

}

.data-item h4{

    margin-bottom:10px;

}

.data-actions{

    margin-top:15px;

    display:flex;
    gap:10px;

}

.data-actions button{

    border:none;

    padding:10px 14px;

    border-radius:12px;

    cursor:pointer;

}

@media(max-width:1024px){

    .admin-layout{

        grid-template-columns:1fr;

    }

    .sidebar{

        position:relative;
        height:auto;

    }

    .main{

        padding:24px;

    }

}

</style>

</head>

<body>

<!-- LOGIN -->

<section
id="login-screen"
class="login-screen">

    <div class="login-card">

        <img
        src="https://eecydiklyryzffenmpwn.supabase.co/storage/v1/object/public/cael-assets/logo/logotipo.001.png"
        alt="CAEL">

        <h1>Admin Access</h1>

        <input
        id="email"
        type="email"
        placeholder="Email">

        <input
        id="password"
        type="password"
        placeholder="Password">

        <button
        id="login-btn">

            Sign In

        </button>

    </div>

</section>

<!-- APP -->

<div
id="admin-app"
class="admin-layout hidden">

    <aside class="sidebar">

        <img
        class="sidebar-logo"
        src="https://eecydiklyryzffenmpwn.supabase.co/storage/v1/object/public/cael-assets/logo/logotipo.001.png"
        alt="CAEL">

        <nav>

            <button data-section="hero">
                Hero
            </button>

            <button data-section="products">
                Products
            </button>

            <button data-section="collections">
                Collections
            </button>

            <button data-section="settings">
                Settings
            </button>

        </nav>

        <button
        id="logout-btn"
        class="logout-btn">

            Logout

        </button>

    </aside>

    <main class="main">

        <!-- HERO -->

        <section
        id="hero"
        class="section active">

            <h2 class="section-title">
                Hero
            </h2>

            <div class="panel">

                <form
                id="hero-form"
                class="form-grid">

                    <input id="hero-title" placeholder="Title">

                    <input id="hero-subtitle" placeholder="Subtitle">

                    <input id="hero-image" placeholder="Image URL">

                    <input id="hero-button" placeholder="Button Text">

                    <input id="hero-link" placeholder="Button Link">

                    <button
                    class="primary-btn"
                    type="submit">

                        Save Hero

                    </button>

                </form>

            </div>

        </section>

        <!-- PRODUCTS -->

        <section
        id="products"
        class="section">

            <h2 class="section-title">
                Products
            </h2>

            <div class="panel">

                <form
                id="product-form"
                class="form-grid">

                    <input id="product-name" placeholder="Name">

                    <input id="product-price" placeholder="Price">

                    <input id="product-category" placeholder="Category">

                    <input id="product-image" placeholder="Image URL">

                    <textarea id="product-description"></textarea>

                    <select id="product-collection"></select>

                    <button
                    type="submit"
                    class="primary-btn">

                        Save Product

                    </button>

                </form>

            </div>

            <div
            id="products-list"
            class="data-list">

            </div>

        </section>

        <!-- COLLECTIONS -->

        <section
        id="collections"
        class="section">

            <h2 class="section-title">
                Collections
            </h2>

            <div class="panel">

                <form
                id="collection-form"
                class="form-grid">

                    <input id="collection-name">

                    <input id="collection-banner">

                    <textarea id="collection-description"></textarea>

                    <button
                    class="primary-btn"
                    type="submit">

                        Save Collection

                    </button>

                </form>

            </div>

            <div
            id="collections-list"
            class="data-list">

            </div>

        </section>

        <!-- SETTINGS -->

        <section
        id="settings"
        class="section">

            <h2 class="section-title">
                Settings
            </h2>

            <div class="panel">

                <form
                id="settings-form"
                class="form-grid">

                    <input id="brand-name">

                    <input id="logo-url">

                    <textarea id="footer-text"></textarea>

                    <textarea id="newsletter-text"></textarea>

                    <button
                    type="submit"
                    class="primary-btn">

                        Save Settings

                    </button>

                </form>

            </div>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="admin.js"></script>

</body>
</html>
